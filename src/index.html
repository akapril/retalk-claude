<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>retalk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="search-bar">
      <input
        type="text"
        id="search-input"
        placeholder="搜索会话..."
        autocomplete="off"
        spellcheck="false"
      />
      <div class="toolbar-icons">
        <div class="icon-dropdown" id="dd-provider">
          <button class="icon-btn" title="工具筛选"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M1 8h14M8 2a10 10 0 0 1 3 6 10 10 0 0 1-3 6 10 10 0 0 1-3-6 10 10 0 0 1 3-6z"/></svg></button>
          <div class="icon-dropdown-menu">
            <div class="dd-item active" data-value="all">全部工具</div>
            <div class="dd-item" data-value="claude">Claude</div>
            <div class="dd-item" data-value="codex">Codex</div>
            <div class="dd-item" data-value="gemini">Gemini</div>
            <div class="dd-item" data-value="opencode">OpenCode</div>
            <div class="dd-item" data-value="kilo">Kilo Code</div>
          </div>
        </div>
        <div class="icon-dropdown" id="dd-view">
          <button class="icon-btn" title="视图模式"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg></button>
          <div class="icon-dropdown-menu">
            <div class="dd-item active" data-value="project">按项目</div>
            <div class="dd-item" data-value="timeline">时间线</div>
          </div>
        </div>
        <div class="icon-dropdown" id="dd-sort">
          <button class="icon-btn" title="排序方式"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 3v10M2 11l2 2 2-2M12 13V3M10 5l2-2 2 2"/></svg></button>
          <div class="icon-dropdown-menu">
            <div class="dd-item active" data-value="time">按时间</div>
            <div class="dd-item" data-value="name">按名称</div>
          </div>
        </div>
        <button id="stats-btn" class="icon-btn" title="统计"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="8" width="3" height="6" rx="0.5"/><rect x="6.5" y="4" width="3" height="10" rx="0.5"/><rect x="11" y="2" width="3" height="12" rx="0.5"/></svg></button>
        <button id="settings-btn" class="icon-btn" title="设置"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"/></svg></button>
      </div>
    </div>
    <div id="session-list" class="session-list"></div>
    <div id="preview-panel" class="preview-panel" style="display:none">
      <div class="preview-title">最近消息</div>
      <div id="preview-messages" class="preview-messages"></div>
    </div>
    <!-- 右键菜单 -->
    <div id="context-menu" class="context-menu" style="display:none">
      <div class="ctx-item" data-action="resume">恢复会话</div>
      <div class="ctx-item" data-action="vscode">在 VS Code 中打开</div>
      <div class="ctx-item" data-action="explorer">在文件管理器中打开</div>
      <div class="ctx-item" data-action="copy-path">复制项目路径</div>
      <div class="ctx-item" data-action="copy-cmd">复制恢复命令</div>
      <div class="ctx-item" data-action="export-md">导出 Markdown</div>
      <div class="ctx-item" data-action="export-file">导出到文件</div>
      <div class="ctx-item" data-action="compare">对比工具</div>
    </div>
    <!-- 统计视图 -->
    <div id="stats-panel" class="stats-panel" style="display:none"></div>
    <div id="settings-panel" class="settings-panel" style="display:none">
      <div class="settings-section">
        <div class="settings-title">快捷键</div>
        <div class="settings-row">
          <label>全局快捷键</label>
          <input type="text" id="cfg-hotkey" class="settings-input hotkey-input" readonly placeholder="点击后按下快捷键..." />
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-title">终端</div>
        <div class="settings-row">
          <label>首选终端</label>
          <select id="cfg-terminal" class="settings-select">
            <option value="auto">自动检测</option>
            <option value="wt">Windows Terminal</option>
            <option value="pwsh">PowerShell</option>
            <option value="cmd">CMD</option>
          </select>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-title">数据更新</div>
        <div class="settings-row">
          <label>文件监听</label>
          <input type="checkbox" id="cfg-watcher" />
        </div>
        <div class="settings-row">
          <label>定时轮询</label>
          <input type="checkbox" id="cfg-poll" />
        </div>
        <div class="settings-row">
          <label>轮询间隔 (秒)</label>
          <input type="number" id="cfg-poll-interval" class="settings-input settings-input-sm" min="5" max="300" />
        </div>
        <div class="settings-row">
          <label>按需刷新</label>
          <input type="checkbox" id="cfg-ondemand" />
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-title">界面</div>
        <div class="settings-row">
          <label>最大结果数</label>
          <input type="number" id="cfg-max-results" class="settings-input settings-input-sm" min="10" max="500" />
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-title">启动</div>
        <div class="settings-row">
          <label>开机自启动</label>
          <input type="checkbox" id="cfg-autostart" />
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-title">标签</div>
        <div class="settings-row">
          <label>自动识别标签</label>
          <button id="auto-tag-btn" class="settings-btn-primary">执行</button>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-title">数据</div>
        <div class="settings-row">
          <label>重建搜索索引</label>
          <button id="rebuild-index-btn" class="settings-btn">重建</button>
        </div>
      </div>
      <div class="settings-actions">
        <button id="settings-save" class="settings-btn-primary">保存</button>
        <button id="settings-cancel" class="settings-btn">取消</button>
      </div>
    </div>
    <div class="status-bar" id="status-bar">
      <span>↑↓ 导航</span>
      <span>Enter 恢复</span>
      <span>Ctrl+C 复制命令</span>
      <span>Esc 关闭</span>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
